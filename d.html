<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Loading your preview…</title>
  <style>
    html,body{height:100%;margin:0}
    body{background:#0a2240;color:#fff;font-family:Inter,system-ui,sans-serif;
         display:flex;align-items:center;justify-content:center;text-align:center}
    .w{padding:24px}
    .b{font-weight:800;font-size:20px;letter-spacing:-.01em}
    .b span{color:#d4a432}
    .m{margin-top:10px;font-size:14px;color:#94a3b8}
    .s{margin:22px auto 0;width:26px;height:26px;border:3px solid rgba(255,255,255,.2);
       border-top-color:#d4a432;border-radius:50%;animation:r .8s linear infinite}
    @keyframes r{to{transform:rotate(360deg)}}
    a{color:#d4a432}
  </style>
</head>
<body>
  <div class="w">
    <div class="b">Florida<span>Trade</span>Sites</div>
    <div class="m" id="msg">Loading your website preview…</div>
    <div class="s" id="spin"></div>
  </div>

<script>
/* Short demo links.
   The personalised demo URL is ~140 chars of encoded query string, which costs
   extra SMS segments and reads as spam to carrier filters. Instead we text
   https://floridatradesites.com/d/<id> (~32 chars). Netlify rewrites /d/* to
   this page (200, so the path is preserved), we look <id> up in demos.json and
   hand off to the real demo.

   A static map + ONE wildcard rule is deliberate: per-lead redirect rules in
   _redirects would mean 1253 entries, and Netlify degrades past roughly 1000. */
(function () {
  var m = location.pathname.match(/\/d\/([A-Za-z0-9_-]+)\/?$/);
  var id = m && m[1];

  function fail(note) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('msg').innerHTML =
      (note || "We couldn't find that preview.") +
      '<br><br><a href="/index.html">Go to FloridaTradeSites</a>';
  }

  if (!id) { fail(); return; }

  fetch('/demos.json', { cache: 'force-cache' })
    .then(function (r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function (map) {
      var q = map[id];
      if (!q) { fail(); return; }
      // replace() so Back returns to the SMS/browser, not this interstitial
      location.replace('/demo.html?' + q);
    })
    .catch(function () {
      fail("That preview couldn't load right now.");
    });
})();
</script>
</body>
</html>
